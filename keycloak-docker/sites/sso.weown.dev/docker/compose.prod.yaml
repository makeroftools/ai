# sso - Docker Compose (ADR-006: In-Container Infisical Injection)
# Secrets are fetched IN-PROCESS by containers at startup via `infisical run` entrypoint.
# A `docker restart` re-fetches secrets (bounce-to-refresh). No secrets in environment: blocks.
# No secrets should be stored in this file or in .env files on disk.
#
# Required Infisical secrets (names must match each app's expected env var names):
#   PostgreSQL: POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
#   Keycloak:   KC_DB_USERNAME, KC_DB_PASSWORD, KEYCLOAK_ADMIN, KEYCLOAK_ADMIN_PASSWORD
#
# Copier variables used in environment blocks:
#   KC_DB_URL_DATABASE: database name for Keycloak JDBC URL (copier var: keycloak_db_name)
#
# Note: KC_DB_USERNAME and KC_DB_PASSWORD hold the same values as POSTGRES_USER and
# POSTGRES_PASSWORD respectively, but are stored as separate Infisical secrets so each
# app sees the env var names it expects. This is the ADR-006 approach: no ${VAR}
# interpolation in compose, secrets fetched in-process by infisical run entrypoint.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    # ADR-006: wrapper script authenticates to Infisical and execs original entrypoint
    entrypoint: ["/opt/sso/entrypoint-infisical.sh"]
    command: ["docker-entrypoint.sh", "postgres"]
    volumes:
      - db_data:/var/lib/postgresql/data
      # ADR-006: bind-mount Infisical CLI + auth file + wrapper script (read-only)
      - /usr/bin/infisical:/usr/bin/infisical:ro
      - /opt/sso/.infisical-auth.env.container:/.infisical-auth.env:ro
      - /opt/sso/entrypoint-infisical.sh:/opt/sso/entrypoint-infisical.sh:ro
      # Infisical CLI TLS: needed to reach app.infisical.com
      - /etc/ssl/certs:/etc/ssl/certs:ro
    networks:
      - keycloaknet
    healthcheck:
      # POSTGRES_USER is injected at runtime by infisical run, not available at
      # compose parse time. Use a simple TCP check instead of pg_isready -U.
      test: ["CMD-SHELL", "pg_isready -h localhost"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  keycloak:
    image: reg.mini.dev/keycloak:26.0 # Pinned per Lesson #1 — verify before bumping
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # ADR-006: wrapper script authenticates to Infisical and execs original entrypoint
    entrypoint: ["/opt/sso/entrypoint-infisical.sh"]
    command: ["/opt/keycloak/bin/kc.sh", "start"]
    environment:
      # Non-secret config only; secrets fetched by entrypoint
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_PORT: "5432"
      KC_DB_URL_DATABASE: "keycloak-sso"
      # HTTPS terminated at Caddy edge; Keycloak runs HTTP-only internally
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: sso.weown.id
      KC_HOSTNAME_URL: https://sso.weown.id
      KC_HOSTNAME_ADMIN_URL: https://sso.weown.id
      KC_HOSTNAME_STRICT: "true"
      # Important: Caddy sends Forwarded header (RFC 7239), not X-Forwarded-Proto
      # proxy-headers=forwarded tells Keycloak to read Forwarded for scheme/host
      # Without this, Keycloak generates HTTP URLs despite HTTPS at edge
      KC_PROXY_HEADERS: forwarded
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      # Secrets (KC_DB_USERNAME, KC_DB_PASSWORD, KEYCLOAK_ADMIN, KEYCLOAK_ADMIN_PASSWORD)
      # fetched by entrypoint, NOT listed here.
    volumes:
      - keycloak_data:/opt/keycloak/data
      # ADR-006: bind-mount Infisical CLI + auth file + wrapper script (read-only)
      - /usr/bin/infisical:/usr/bin/infisical:ro
      - /opt/sso/.infisical-auth.env.container:/.infisical-auth.env:ro
      - /opt/sso/entrypoint-infisical.sh:/opt/sso/entrypoint-infisical.sh:ro
      # Infisical CLI TLS: needed to reach app.infisical.com
      - /etc/ssl/certs:/etc/ssl/certs:ro
      # JVM truststore: Keycloak needs this to talk to Infisical API over TLS
      - /etc/ssl/certs/java/cacerts:/etc/ssl/certs/java/cacerts:ro
    networks:
      - keycloaknet
    healthcheck:
      # Busybox ash doesn't support /dev/tcp (bash-ism), and no curl/wget/nc
      # is available in the MinimOS image. Use pidof on the Java process
      # to verify Keycloak is running (the server starts on port 8080).
      test: ["CMD-SHELL", "pidof java > /dev/null 2>&1"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  caddy:
    image: reg.mini.dev/caddy:2
    restart: unless-stopped
    depends_on:
      - keycloak
    environment:
      DOMAIN: sso.weown.id
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /var/log/caddy:/var/log/caddy:rw
    networks:
      - keycloaknet
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  db_data:
    name: sso_db_data
  keycloak_data:
    name: sso_keycloak_data
  caddy_data:
    name: sso_caddy_data
  caddy_config:
    name: sso_caddy_config

networks:
  keycloaknet:
    name: sso_net
    driver: bridge
